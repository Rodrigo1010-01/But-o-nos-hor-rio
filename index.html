<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Relogio cosmico interativo com metas e contagem regressiva em horario de Brasilia.">
  <title>BEYOND | TIME</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="cur" aria-hidden="true"></div>
  <div id="cur2" aria-hidden="true"></div>
  <canvas id="cv" aria-label="Relogio espacial interativo com metas"></canvas>

  <header id="header">
    <div id="header-left">
      <div>É a terceira lei de newton, a única maneira que os humanos têm</div>
      <div>para ir a algum lugar é deixando algo para trás. - Interestelar</div>
    </div>

    <div id="header-right">
      <div id="htime">--:--:--.---</div>
      <div id="hdate"></div>
      <div id="htimezone">BRASILIA | AMERICA/SAO_PAULO</div>
      <button id="audio-toggle" type="button">[ ativar trilha ]</button>
    </div>
  </header>

  <div id="hint">hora real de brasilia | feito por rodrigo ortiz greczysczyn</div>

  <aside id="goal-card" aria-live="polite" aria-label="Detalhes da meta selecionada">
    <button id="gc-back" type="button">[ voltar ao relogio ]</button>

    <div class="gc-inner">
      <div class="gc-n" id="gc-n"></div>
      <div class="gc-title" id="gc-title"></div>
      <div class="gc-when" id="gc-when"></div>
      <div class="gc-status" id="gc-status"></div>
      <button id="gc-morse" type="button">[ ver em morse ]</button>
      <div class="gc-desc" id="gc-desc"></div>
      <div class="gc-detail-grid" id="gc-detail-grid"></div>
      <div class="gc-count-label" id="gc-count-label"></div>
      <div class="gc-cd" id="gc-cd"></div>
    </div>
  </aside>

  <audio id="soundtrack" preload="auto" src="msc.mp3"></audio>

  <script src="script.js" defer></script>
</body>
</html>
